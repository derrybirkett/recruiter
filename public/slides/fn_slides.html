  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

mal;\n  font-weight: 600;\n  font-stretch: 100%;\n  font-display: swap;\n  src: url(\"f9760489-e034-49e8-bf82-a509a9a4755e\") format('woff2');\n  unicode-range: U+0301, U+0400-045F, U+0490-0491, U+04B0-04B1, U+2116;\n}\n/* greek */\n@font-face {\n  font-family: 'IBM Plex Sans';\n  font-style: normal;\n  font-weight: 600;\n  font-stretch: 100%;\n  font-display: swap;\n  src: url(\"ec024166-4a78-40a5-a49a-2c83357da44a\") format('woff2');\n  unicode-range: U+0370-0377, U+037A-037F, U+0384-038A, U+038C, U+038E-03A1, U+03A3-03FF;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'IBM Plex Sans';\n  font-style: normal;\n  font-weight: 600;\n  font-stretch: 100%;\n  font-display: swap;\n  src: url(\"6bcb9846-2e65-47f0-b033-a1a348d2c272\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'IBM Plex Sans';\n  font-style: normal;\n  font-weight: 600;\n  font-stretch: 100%;\n  font-display: swap;\n  src: url(\"5a80081e-850c-47b2-a962-d4d141978c2b\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'IBM Plex Sans';\n  font-style: normal;\n  font-weight: 600;\n  font-stretch: 100%;\n  font-display: swap;\n  src: url(\"75c21a41-7deb-4632-8108-0909b11a3638\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>/* === FounderNest Design Case — Wireframe Deck === */\n\n:root {\n  --bg: #fafaf9;\n  --paper: #ffffff;\n  --ink: #1a1a1a;\n  --ink-2: #6b6b6b;\n  --ink-3: #a8a8a8;\n  --line: #d4d4d4;\n  --line-soft: #ececec;\n  --fill: #f4f3f0;\n  --fill-2: #ebeae5;\n  --accent: oklch(0.62 0.18 28);\n  --accent-soft: oklch(0.94 0.04 30);\n  --hi: oklch(0.93 0.13 100);\n  --ok: oklch(0.55 0.12 150);\n}\n\n* { box-sizing: border-box; }\nhtml, body { margin: 0; padding: 0; background: #1a1a1a; }\n\n/* deck-stage handles scaling. Slides are 1920×1080. */\nsection.slide {\n  width: 1920px;\n  height: 1080px;\n  background: var(--bg);\n  color: var(--ink);\n  font-family: \"IBM Plex Sans\", system-ui, sans-serif;\n  font-weight: 400;\n  position: relative;\n  overflow: hidden;\n  display: block;\n}\n\n/* Slide chrome: header strip with slide # + name */\n.slide-head {\n  position: absolute;\n  top: 36px;\n  left: 56px;\n  right: 56px;\n  display: flex;\n  justify-content: space-between;\n  align-items: baseline;\n  font-family: \"IBM Plex Mono\", monospace;\n  font-size: 14px;\n  letter-spacing: 0.08em;\n  text-transform: uppercase;\n  color: var(--ink-3);\n}\n.slide-head .left { display: flex; gap: 24px; align-items: baseline; }\n.slide-head .num {\n  color: var(--ink);\n  border: 1px solid var(--ink);\n  padding: 4px 10px;\n  border-radius: 2px;\n}\n.slide-head .title { color: var(--ink); font-weight: 500; letter-spacing: 0.06em; }\n\n.slide-title {\n  position: absolute;\n  top: 92px;\n  left: 56px;\n  font-size: 52px;\n  font-weight: 500;\n  letter-spacing: -0.02em;\n  line-height: 1.05;\n  max-width: 1500px;\n  text-wrap: balance;\n}\n.slide-sub {\n  position: absolute;\n  top: 168px;\n  left: 56px;\n  font-size: 20px;\n  color: var(--ink-2);\n  max-width: 980px;\n  line-height: 1.5;\n}\n\n/* ───────── Wireframe primitives ───────── */\n.wf {\n  background: var(--paper);\n  border: 1.5px solid var(--ink);\n  border-radius: 4px;\n}\n.wf-soft { background: var(--paper); border: 1px solid var(--line); border-radius: 6px; }\n.wf-fill { background: var(--fill); border: 1px dashed var(--line); border-radius: 4px; }\n.wf-row { display: flex; align-items: center; gap: 12px; }\n\n.appbar {\n  height: 64px;\n  border-bottom: 1.5px solid var(--ink);\n  background: var(--paper);\n  display: flex;\n  align-items: center;\n  padding: 0 28px;\n  gap: 32px;\n}\n.appbar .logo {\n  font-family: \"IBM Plex Mono\", monospace;\n  font-weight: 600;\n  font-size: 15px;\n  letter-spacing: 0.02em;\n  border: 1.5px solid var(--ink);\n  padding: 6px 12px;\n  border-radius: 3px;\n}\n.appbar .navlinks {\n  display: flex; gap: 28px;\n  font-size: 14px;\n  color: var(--ink-2);\n}\n.appbar .navlinks .active { color: var(--ink); font-weight: 500; }\n.appbar .right { margin-left: auto; display: flex; gap: 12px; align-items: center; font-size: 13px; color: var(--ink-3); }\n\n.searchbar {\n  border: 1.5px solid var(--ink);\n  background: var(--paper);\n  border-radius: 6px;\n  padding: 14px 18px;\n  display: flex;\n  align-items: center;\n  gap: 14px;\n  font-size: 17px;\n}\n.searchbar .placeholder { color: var(--ink-3); }\n.searchbar .typed { color: var(--ink); }\n.searchbar .caret {\n  display: inline-block;\n  width: 2px; height: 22px;\n  background: var(--ink);\n  animation: caret 1s steps(2) infinite;\n  margin-left: 2px;\n  vertical-align: text-bottom;\n}\n@keyframes caret { 50% { opacity: 0; } }\n\n.kbd {\n  font-family: \"IBM Plex Mono\", monospace;\n  font-size: 11px;\n  border: 1px solid var(--line);\n  padding: 2px 6px;\n  border-radius: 3px;\n  color: var(--ink-2);\n  background: var(--paper);\n}\n\n.chip {\n  display: inline-flex;\n  align-items: center;\n  gap: 8px;\n  padding: 7px 12px 7px 12px;\n  border: 1px solid var(--ink);\n  border-radius: 999px;\n  background: var(--paper);\n  font-size: 13px;\n  white-space: nowrap;\n}\n.chip.derived {\n  background: var(--accent-soft);\n  border-color: var(--accent);\n  color: var(--ink);\n}\n.chip.derived::before {\n  content: \"✦\";\n  color: var(--accent);\n  font-size: 11px;\n}\n.chip.manual { background: var(--paper); }\n.chip .x {\n  font-size: 11px;\n  color: var(--ink-3);\n  margin-left: 2px;\n  cursor: default;\n}\n.chip .label { font-family: \"IBM Plex Mono\", monospace; font-size: 10px; text-transform: uppercase; color: var(--ink-3); letter-spacing: 0.06em; }\n.chip.value-stack { padding-left: 10px; gap: 6px; }\n.chip.conflict {\n  border-color: var(--accent);\n  background: var(--accent-soft);\n  color: var(--ink);\n  position: relative;\n}\n.chip.conflict::after {\n  content: \"!\";\n  width: 18px; height: 18px;\n  border-radius: 50%;\n  background: var(--accent);\n  color: white;\n  display: inline-flex; align-items: center; justify-content: center;\n  font-weight: 700; font-size: 11px;\n  margin-left: 2px;\n}\n\n.rail {\n  width: 280px;\n  border-right: 1.5px solid var(--ink);\n  background: var(--paper);\n  padding: 24px 22px;\n  display: none; /* Hidden — filters now live in the right-side panel. */\n}\n.rail h4 {\n  margin: 0 0 14px 0;\n  font-size: 11px;\n  text-transform: uppercase;\n  letter-spacing: 0.1em;\n  color: var(--ink-3);\n  font-family: \"IBM Plex Mono\", monospace;\n  font-weight: 500;\n}\n.rail .row {\n  display: flex;\n  justify-content: space-between;\n  align-items: center;\n  padding: 11px 0;\n  border-bottom: 1px solid var(--line-soft);\n  font-size: 14px;\n  color: var(--ink);\n  white-space: nowrap;\n}\n.rail .row .count {\n  font-size: 11px;\n  color: var(--ink-3);\n  font-family: \"IBM Plex Mono\", monospace;\n}\n.rail .row.active { color: var(--accent); font-weight: 500; }\n\n.btn {\n  display: inline-flex; align-items: center; gap: 8px;\n  border: 1.5px solid var(--ink);\n  background: var(--paper);\n  padding: 9px 16px;\n  border-radius: 4px;\n  font-size: 13px;\n  font-weight: 500;\n  font-family: inherit;\n}\n.btn.primary { background: var(--ink); color: var(--paper); }\n.btn.ghost { border: 1px dashed var(--line); color: var(--ink-2); }\n.btn.accent { background: var(--accent); border-color: var(--accent); color: white; }\n\n/* Candidate card */\n.cand {\n  border: 1px solid var(--line);\n  background: var(--paper);\n  border-radius: 6px;\n  padding: 18px 20px;\n  display: grid;\n  grid-template-columns: 64px 1fr auto;\n  gap: 18px;\n  align-items: start;\n}\n.cand .avatar {\n  width: 64px; height: 64px;\n  border-radius: 50%;\n  background: var(--fill-2);\n  border: 1px dashed var(--line);\n  display: flex; align-items: center; justify-content: center;\n  font-family: \"IBM Plex Mono\", monospace;\n  font-size: 12px;\n  color: var(--ink-3);\n}\n.cand .name { font-size: 18px; font-weight: 500; margin-bottom: 2px; }\n.cand .role { font-size: 14px; color: var(--ink-2); margin-bottom: 12px; }\n.cand .why {\n  font-size: 13px;\n  line-height: 1.55;\n  color: var(--ink-2);\n  margin-bottom: 10px;\n}\n.cand .why mark {\n  background: var(--hi);\n  color: var(--ink);\n  padding: 1px 4px;\n  border-radius: 2px;\n  font-weight: 500;\n}\n.cand .matchstrip {\n  display: flex; flex-wrap: wrap; gap: 6px;\n  margin-top: 8px;\n}\n.cand .meta {\n  text-align: right;\n  font-family: \"IBM Plex Mono\", monospace;\n  font-size: 11px;\n  color: var(--ink-3);\n  white-space: nowrap;\n}\n.cand .score {\n  font-size: 32px;\n  color: var(--ink);\n  font-family: \"IBM Plex Sans\", sans-serif;\n  font-weight: 500;\n  letter-spacing: -0.02em;\n  line-height: 1;\n}\n.cand .score sup { font-size: 13px; color: var(--ink-3); }\n\n.match-pill {\n  font-family: \"IBM Plex Mono\", monospace;\n  font-size: 10px;\n  text-transform: uppercase;\n  letter-spacing: 0.06em;\n  padding: 3px 8px;\n  border-radius: 3px;\n  border: 1px solid var(--line);\n  color: var(--ink-2);\n  background: var(--paper);\n  display: inline-flex; align-items: center; gap: 5px;\n}\n.match-pill.hit { border-color: var(--ok); color: var(--ok); }\n.match-pill.hit::before { content: \"✓\"; font-size: 11px; }\n.match-pill.miss { border-color: var(--accent); color: var(--accent); }\n.match-pill.miss::before { content: \"✕\"; font-size: 11px; }\n.match-pill.prompt::before { content: \"✦\"; color: var(--accent); }\n.match-pill.prompt { border-color: var(--accent); color: var(--accent); }\n\n/* Annotations */\n.anno {\n  position: absolute;\n  font-family: \"Caveat\", \"Comic Sans MS\", cursive;\n  color: var(--accent);\n  font-size: 26px;\n  line-height: 1.1;\n  font-weight: 500;\n  max-width: 280px;\n  pointer-events: none;\n}\n.anno.sm { font-size: 22px; }\n.anno.lg { font-size: 32px; }\n.anno-arrow {\n  position: absolute;\n  pointer-events: none;\n}\n.anno-arrow path, .anno-arrow line {\n  stroke: var(--accent);\n  stroke-width: 2;\n  fill: none;\n  stroke-linecap: round;\n  stroke-linejoin: round;\n}\n\n/* Slide-1 brief layout */\n.brief-grid {\n  position: absolute;\n  top: 280px;\n  left: 56px;\n  right: 56px;\n  display: grid;\n  grid-template-columns: 1fr 1fr 1fr 1fr;\n  gap: 32px;\n}\n.brief-col h3 {\n  font-family: \"IBM Plex Mono\", monospace;\n  font-size: 11px;\n  text-transform: uppercase;\n  letter-spacing: 0.1em;\n  color: var(--accent);\n  margin: 0 0 14px 0;\n  font-weight: 500;\n  padding-bottom: 10px;\n  border-bottom: 1.5px solid var(--ink);\n}\n.brief-col ul {\n  margin: 0; padding: 0; list-style: none;\n}\n.brief-col li {\n  font-size: 15px;\n  line-height: 1.5;\n  margin-bottom: 14px;\n  padding-left: 18px;\n  position: relative;\n  color: var(--ink);\n}\n.brief-col li::before {\n  content: \"—\";\n  position: absolute;\n  left: 0;\n  color: var(--ink-3);\n}\n.brief-col li b { font-weight: 600; color: var(--ink); }\n\n.deck-index {\n  position: absolute;\n  bottom: 60px;\n  left: 56px;\n  right: 56px;\n  display: grid;\n  grid-template-columns: repeat(10, 1fr);\n  gap: 10px;\n  font-family: \"IBM Plex Mono\", monospace;\n  font-size: 10px;\n  text-transform: uppercase;\n  letter-spacing: 0.06em;\n}\n.deck-index .ix {\n  border: 1px solid var(--line);\n  padding: 8px 10px;\n  border-radius: 3px;\n  color: var(--ink-2);\n  background: var(--paper);\n  min-height: 64px;\n  display: flex;\n  flex-direction: column;\n  justify-content: space-between;\n}\n.deck-index .ix .n { color: var(--ink); font-weight: 600; }\n\n/* Footer corner stamps */\n.stamp {\n  position: absolute;\n  bottom: 32px;\n  left: 56px;\n  font-family: \"IBM Plex Mono\", monospace;\n  font-size: 11px;\n  color: var(--ink-3);\n  letter-spacing: 0.06em;\n}\n.stamp-r {\n  position: absolute;\n  bottom: 32px;\n  right: 56px;\n  font-family: \"IBM Plex Mono\", monospace;\n  font-size: 11px;\n  color: var(--ink-3);\n  letter-spacing: 0.06em;\n}\n\n/* Variant tag */\n.variant-tag {\n  position: absolute;\n  top: 92px;\n  right: 56px;\n  display: flex;\n  gap: 8px;\n  align-items: center;\n}\n.variant-tag .pill {\n  font-family: \"IBM Plex Mono\", monospace;\n  font-size: 11px;\n  letter-spacing: 0.08em;\n  text-transform: uppercase;\n  padding: 6px 12px;\n  border: 1px solid var(--ink);\n  border-radius: 3px;\n  background: var(--paper);\n}\n.variant-tag .pill.on {\n  background: var(--ink);\n  color: var(--paper);\n}\n\n/* Generic placeholder block */\n.ph {\n  background: repeating-linear-gradient(\n    135deg,\n    var(--fill) 0 8px,\n    transparent 8px 14px\n  );\n  border: 1px dashed var(--line);\n  color: var(--ink-3);\n  font-family: \"IBM Plex Mono\", monospace;\n  font-size: 11px;\n  letter-spacing: 0.06em;\n  text-transform: uppercase;\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  border-radius: 4px;\n}\n\n/* Tweaks panel styling overrides (vanilla) */\n#tweaks-host {\n  position: fixed;\n  bottom: 24px;\n  right: 24px;\n  z-index: 9999;\n  background: var(--paper);\n  border: 1.5px solid var(--ink);\n  border-radius: 6px;\n  font-family: \"IBM Plex Sans\", system-ui, sans-serif;\n  color: var(--ink);\n  padding: 16px;\n  width: 280px;\n  display: none;\n  box-shadow: 0 8px 32px rgba(0,0,0,0.12);\n}\n#tweaks-host.on { display: block; }\n#tweaks-host h5 {\n  margin: 0 0 10px;\n  font-family: \"IBM Plex Mono\", monospace;\n  font-size: 11px;\n  text-transform: uppercase;\n  letter-spacing: 0.08em;\n  display: flex;\n  justify-content: space-between;\n}\n#tweaks-host .close { cursor: pointer; color: var(--ink-3); font-weight: 400;}\n#tweaks-host .hint { font-size: 12px; color: var(--ink-2); margin-bottom: 10px; line-height: 1.4; }\n#tweaks-host .opts { display: flex; flex-direction: column; gap: 6px; }\n#tweaks-host .opt {\n  border: 1px solid var(--line);\n  padding: 10px 12px;\n  border-radius: 4px;\n  cursor: pointer;\n  font-size: 13px;\n  display: flex;\n  align-items: center;\n  gap: 10px;\n}\n#tweaks-host .opt:hover { border-color: var(--ink); }\n#tweaks-host .opt.on { border-color: var(--accent); background: var(--accent-soft); }\n#tweaks-host .opt .k { font-family: \"IBM Plex Mono\", monospace; font-size: 11px; color: var(--ink-3); }\n#tweaks-host .opt.on .k { color: var(--accent); }\n<\u002Fstyle>\n<script src=\"d0603460-b956-4b8d-87a1-d7277efdedfe\"><\u002Fscript>\n<\u002Fhead>\n<body>\n\n<deck-stage>\n\n<!-- ════════════════════════════════════════════════════════════════════\n     SLIDE 1 — BRIEF / COVER\n     ════════════════════════════════════════════════════════════════════ -->\n<section class=\"slide\" data-screen-label=\"01 Brief\">\n  <div class=\"slide-head\">\n    <div class=\"left\">\n      <span class=\"num\">01 / 07<\u002Fspan>\n      <span class=\"title\">Brief<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"right\">FounderNest · Design Case · Candidate Search<\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"slide-title\" style=\"top: 92px;\">\n    Framing and Macro-interactions.\n  <\u002Fdiv>\n\n  <div class=\"brief-grid\" style=\"top: 200px;\">\n\n    <div class=\"brief-col\">\n      <h3>Problem framing<\u002Fh3>\n      <ul>\n        <li>Prompt-only search is <b>vague<\u002Fb>; filter-only search is <b>tedious<\u002Fb>.<\u002Fli>\n        <li>Recruiters don't know <b>what belongs where<\u002Fb> — and the two often conflict.<\u002Fli>\n        <li>Geography is <b>hierarchical<\u002Fb>, not a free-text field.<\u002Fli>\n        <li>\"Why this candidate?\" has to be answered <b>on the card<\u002Fb>, not in a modal.<\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv>\n\n    <div class=\"brief-col\">\n      <h3>Key assumptions<\u002Fh3>\n      <ul>\n        <li>Recruiters work on <b>desktop<\u002Fb>, keyboard-first, all day.<\u002Fli>\n        <li>The prompt extractor is <b>imperfect<\u002Fb> — every inferred attribute is editable.<\u002Fli>\n        <li>One mental model: <b>prompt = intent<\u002Fb>, <b>filters = rules<\u002Fb>. Filters always win.<\u002Fli>\n        <li>List + detail is enough. No maps, no charts.<\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv>\n\n    <div class=\"brief-col\">\n      <h3>Design principles<\u002Fh3>\n      <ul>\n        <li><b>One applied state.<\u002Fb> One source of truth, always visible.<\u002Fli>\n        <li><b>Provenance.<\u002Fb> Every chip shows where it came from (prompt vs. you).<\u002Fli>\n        <li><b>Conflicts are respectful.<\u002Fb> We surface, you decide. Never silently override.<\u002Fli>\n        <li><b>Iteration over correction.<\u002Fb> Loosen, tighten, relax — in one click.<\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv>\n\n    <div class=\"brief-col\">\n      <h3>What \"good\" looks like<\u002Fh3>\n      <ul>\n        <li>A recruiter pastes a prompt and lands on a <b>tight<\u002Fb> result set in under 10 seconds.<\u002Fli>\n        <li>They can <b>scan<\u002Fb> what's applied without scrolling or hunting.<\u002Fli>\n        <li>When something's off, the UI <b>tells them why<\u002Fb> — before they ask.<\u002Fli>\n        <li>Zero results never feels like a dead end.<\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n\n  <!-- Microinteractions section -->\n  <div style=\"position:absolute; top:560px; left:56px; right:56px;\">\n    <div style=\"display:flex; align-items:baseline; gap:28px; margin-bottom:24px; padding-top:24px; border-top:1.5px solid var(--ink);\">\n      <div style=\"font-size:36px; font-weight:500; letter-spacing:-0.02em; line-height:1;\">Prototype of Microinteractions<\u002Fdiv>\n      <div style=\"font-size:15px; color:var(--ink-3);\">Two ways in — watch or explore<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:28px;\">\n\n      <!-- Video demo box -->\n      <a href=\"https://derrybirkett.github.io/recruiter/fn_demo.mp4\" style=\"text-decoration:none; display:flex; flex-direction:column; justify-content:space-between; padding:40px 44px; background:var(--paper); border:1.5px solid var(--ink); border-radius:6px; min-height:300px; color:var(--ink); transition: background 0.15s;\">\n        <div>\n          <div style=\"font-family:'IBM Plex Mono', monospace; font-size:11px; color:var(--ink-3); letter-spacing:0.1em; text-transform:uppercase; margin-bottom:18px;\">01 · Video walkthrough<\u002Fdiv>\n          <div style=\"font-size:32px; font-weight:500; letter-spacing:-0.02em; line-height:1.1; max-width:500px;\">Watch the full interaction demo<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex; align-items:center; justify-content:space-between; margin-top:32px;\">\n          <div style=\"font-size:14px; color:var(--ink-2);\">Prompt entry → results → edit in place<\u002Fdiv>\n          <div style=\"display:flex; align-items:center; justify-content:center; width:52px; height:52px; border:1.5px solid var(--ink); border-radius:50%;\">\n            <svg width=\"18\" height=\"18\" viewBox=\"0 0 18 18\" fill=\"none\">\n              <polygon points=\"6,3 15,9 6,15\" fill=\"var(--ink)\"><\u002Fpolygon>\n            <\u002Fsvg>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fa>\n\n      <!-- Live prototype box -->\n      <a href=\"https://derrybirkett.github.io/recruiter/search\" target=\"_blank\" style=\"text-decoration:none; display:flex; flex-direction:column; justify-content:space-between; padding:40px 44px; background:var(--ink); border:1.5px solid var(--ink); border-radius:6px; min-height:300px; color:var(--paper);\">\n        <div>\n          <div style=\"font-family:'IBM Plex Mono', monospace; font-size:11px; color:rgba(255,255,255,0.45); letter-spacing:0.1em; text-transform:uppercase; margin-bottom:18px;\">02 · Live prototype<\u002Fdiv>\n          <div style=\"font-size:32px; font-weight:500; letter-spacing:-0.02em; line-height:1.1; max-width:500px;\">Try it yourself<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex; align-items:center; justify-content:space-between; margin-top:32px;\">\n          <div style=\"font-size:14px; color:rgba(255,255,255,0.55);\">Click, type, filter — fully interactive. But remember! It's a fake demo with fake data. It's just an idea.<\u002Fdiv>\n          <div style=\"display:flex; align-items:center; justify-content:center; width:52px; height:52px; border:1.5px solid rgba(255,255,255,0.4); border-radius:50%;\">\n            <svg width=\"18\" height=\"18\" viewBox=\"0 0 18 18\" fill=\"none\">\n              <path d=\"M4 9 L14 9 M10 5 L14 9 L10 13\" stroke=\"white\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath>\n            <\u002Fsvg>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fa>\n\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"deck-index\" style=\"display:none;\">\n    <div class=\"ix\"><span class=\"n\">01<\u002Fspan><span>Brief<\u002Fspan><\u002Fdiv>\n    <div class=\"ix\"><span class=\"n\">02<\u002Fspan><span>Start state<\u002Fspan><\u002Fdiv>\n    <div class=\"ix\"><span class=\"n\">03<\u002Fspan><span>Prompt entry<\u002Fspan><\u002Fdiv>\n    <div class=\"ix\"><span class=\"n\">04<\u002Fspan><span>Applied — A<\u002Fspan><\u002Fdiv>\n    <div class=\"ix\"><span class=\"n\">05<\u002Fspan><span>Edit in place<\u002Fspan><\u002Fdiv>\n    <div class=\"ix\"><span class=\"n\">06<\u002Fspan><span>Conflict — B<\u002Fspan><\u002Fdiv>\n    <div class=\"ix\"><span class=\"n\">07<\u002Fspan><span>Zero / near-miss<\u002Fspan><\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"stamp\">Wireframe case · low-fi · annotated<\u002Fdiv>\n  <div class=\"stamp-r\">Toggle Tweaks → switch interaction model on slide 03<\u002Fdiv>\n<\u002Fsection>\n\n\n<!-- ════════════════════════════════════════════════════════════════════\n     SLIDE 2 — START STATE\n     ════════════════════════════════════════════════════════════════════ -->\n<section class=\"slide\" data-screen-label=\"02 Start state\">\n  <div class=\"slide-head\">\n    <div class=\"left\"><span class=\"num\">02 / 07<\u002Fspan><span class=\"title\">Start state<\u002Fspan><\u002Fdiv>\n    <div class=\"right\">Empty, with a memory of yesterday<\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"slide-title\">An empty page that knows where you left off.<\u002Fdiv>\n\n  <!-- Product frame -->\n  <div class=\"wf\" style=\"position:absolute; left:56px; top:240px; width:1808px; height:760px; overflow:hidden;\">\n\n    <!-- App bar -->\n    <div class=\"appbar\">\n      <div class=\"logo\">FN · recruit<\u002Fdiv>\n      <div class=\"navlinks\">\n        <span class=\"active\">Search<\u002Fspan>\n        <span>Pipelines<\u002Fspan>\n        <span>Outreach<\u002Fspan>\n        <span>Settings<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"right\">\n        <span class=\"kbd\">⌘K<\u002Fspan>\n        <span>opens search anywhere<\u002Fspan>\n        <span style=\"margin-left:18px; width:32px; height:32px; border-radius:50%; background: var(--fill-2); display:inline-block;\"><\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"display:flex; height: calc(100% - 64px);\">\n      <!-- Rail -->\n      <aside class=\"rail\">\n        <h4>Filters<\u002Fh4>\n        <div class=\"row\"><span>Title<\u002Fspan><span class=\"count\">—<\u002Fspan><\u002Fdiv>\n        <div class=\"row\"><span>Skills<\u002Fspan><span class=\"count\">—<\u002Fspan><\u002Fdiv>\n        <div class=\"row\"><span>Years of experience<\u002Fspan><span class=\"count\">—<\u002Fspan><\u002Fdiv>\n        <div class=\"row\"><span>Location<\u002Fspan><span class=\"count\">—<\u002Fspan><\u002Fdiv>\n        <div class=\"row\"><span>Work preference<\u002Fspan><span class=\"count\">—<\u002Fspan><\u002Fdiv>\n        <div class=\"row\"><span>Industry<\u002Fspan><span class=\"count\">—<\u002Fspan><\u002Fdiv>\n        <div class=\"row\"><span>Languages<\u002Fspan><span class=\"count\">—<\u002Fspan><\u002Fdiv>\n        <div class=\"row\"><span>Last active<\u002Fspan><span class=\"count\">—<\u002Fspan><\u002Fdiv>\n        <div style=\"margin-top:24px; font-size:12px; color:var(--ink-3); font-family:'IBM Plex Mono', monospace;\">\n          0 of 8 applied\n        <\u002Fdiv>\n      <\u002Faside>\n\n      <!-- Main -->\n      <main style=\"flex:1; padding: 56px 80px; display:flex; flex-direction:column; gap:36px;\">\n\n        <div style=\"display:flex; flex-direction:column; gap:14px;\">\n          <div style=\"font-family:'IBM Plex Mono', monospace; font-size:11px; color:var(--ink-3); letter-spacing:0.1em; text-transform:uppercase;\">Describe who you're looking for<\u002Fdiv>\n          <div class=\"searchbar\" style=\"height:74px; padding: 0 24px;\">\n            <span style=\"font-family:'IBM Plex Mono', monospace; color:var(--ink-3); font-size:13px; border:1px solid var(--line); padding:4px 8px; border-radius:3px;\">✦ prompt<\u002Fspan>\n            <span class=\"placeholder\">e.g. \"Senior backend engineer, strong Python, Berlin, AI-native startup, open to EU-remote\"<\u002Fspan>\n            <span style=\"margin-left:auto;\" class=\"kbd\">↵ to search<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"font-size:13px; color:var(--ink-3); display:flex; gap:18px;\">\n            <span>or<\u002Fspan>\n            <span style=\"text-decoration: underline dotted; color:var(--ink-2);\">start from a template<\u002Fspan>\n            <span style=\"color:var(--ink-3);\">·<\u002Fspan>\n            <span style=\"text-decoration: underline dotted; color:var(--ink-2);\">add filters manually<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- Last search card -->\n 02Fspan><\u002Fdiv>\n    <div class=\"opt\" data-vopt=\"B\"><span class=\"k\">B<\u002Fspan><span>Equal siblings · prompt + filters<\u002Fspan><\u002Fdiv>\n    <div class=\"opt\" data-vopt=\"C\"><span class=\"k\">C<\u002Fspan><span>Translator · explicit convert step<\u002Fspan><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<script>\n  // Tweaks protocol wiring\n  const host = document.getElementById('tweaks-host');\n  const slidePrompt = document.getElementById('slide-prompt');\n  const vlabel = document.getElementById('vlabel');\n  const vlabels = {\n    A: 'A — prompt-led',\n    B: 'B — equal siblings',\n    C: 'C — translator',\n  };\n\n  function setVariant(v) {\n    if (!['A','B','C'].includes(v)) v = 'A';\n    slidePrompt.setAttribute('data-variant', v);\n    // bodies\n    slidePrompt.querySelectorAll('.vbody').forEach(el => {\n      el.style.display = el.classList.contains('vbody-' + v) ? '' : 'none';\n    });\n    // anno sets — show only matching variant's annotations\n    slidePrompt.querySelectorAll('.anno-set').forEach(el => {\n      el.style.display = el.classList.contains('anno-' + v) ? '' : 'none';\n    });\n    // chips at top\n    slidePrompt.querySelectorAll('[data-vchip]').forEach(el => {\n      el.classList.toggle('on', el.getAttribute('data-vchip') === v);\n    });\n    // tweak panel option highlight\n    host.querySelectorAll('[data-vopt]').forEach(el => {\n      el.classList.toggle('on', el.getAttribute('data-vopt') === v);\n    });\n    if (vlabel) vlabel.textContent = vlabels[v];\n    // persist via parent for the editor (and update host file)\n    try {\n      window.parent.postMessage({type: '__edit_mode_set_keys', edits: {variant: v}}, '*');\n    } catch(e) {}\n  }\n\n  host.querySelectorAll('[data-vopt]').forEach(el => {\n    el.addEventListener('click', () => setVariant(el.getAttribute('data-vopt')));\n  });\n  // Allow clicking the variant tag chips on slide 3 directly too\n  document.querySelectorAll('[data-vchip]').forEach(el => {\n    el.style.cursor = 'pointer';\n    el.addEventListener('click', () => setVariant(el.getAttribute('data-vchip')));\n  });\n\n  // Host protocol: register listener BEFORE announcing availability\n  window.addEventListener('message', (e) => {\n    const t = e.data && e.data.type;\n    if (t === '__activate_edit_mode') host.classList.add('on');\n    else if (t === '__deactivate_edit_mode') host.classList.remove('on');\n  });\n  document.getElementById('tweaks-close').addEventListener('click', () => {\n    host.classList.remove('on');\n    try { window.parent.postMessage({type: '__edit_mode_dismissed'}, '*'); } catch(e) {}\n  });\n\n  // Read persisted variant\n  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{\n    \"variant\": \"A\"\n  }/*EDITMODE-END*/;\n  setVariant(TWEAK_DEFAULTS.variant);\n\n  // Announce availability\n  try { window.parent.postMessage({type: '__edit_mode_available'}, '*'); } catch(e) {}\n\n  // Slide 5 — toggle between top chip bar and right-side filter panel\n  window.setS5View = function(mode){\n    const chips = document.getElementById('s5-chips');\n    const rail  = document.getElementById('s5-rail');\n    if (!chips || !rail) return;\n    if (mode === 'rail') {\n      chips.style.display = 'none';\n      rail.style.display = 'flex';\n    } else {\n      chips.style.display = 'block';\n      rail.style.display = 'none';\n    }\n  };\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
